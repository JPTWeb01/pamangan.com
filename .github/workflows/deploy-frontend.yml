name: Deploy Frontend to Hostinger

on:
  push:
    branches: [main]
    paths:
      - 'pamangan.com/frontend/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - name: Set up Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pamangan.com/frontend/package-lock.json

      - name: Install dependencies
        working-directory: pamangan.com/frontend
        run: npm ci

      - name: Build
        working-directory: pamangan.com/frontend
        env:
          REACT_APP_API_URL: ${{ vars.REACT_APP_API_URL }}
          REACT_APP_SITE_NAME: pamangan.com
        run: npm run build

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@c11a93cf6e44a18f1b6e3a73c3ab73a3667aacb7  # v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local-dir: pamangan.com/frontend/build/
          server-dir: /public_html/
          dangerous-clean-slate: false
