name: Deploy Frontend to Hostinger

on:
  push:
    branches: [main]
    paths:
      - 'pamangan.com/frontend/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: pamangan.com/frontend/package-lock.json

      - name: Install dependencies
        working-directory: pamangan.com/frontend
        run: npm ci

      - name: Build
        working-directory: pamangan.com/frontend
        run: npm run build

      - name: Deploy via rsync over SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          echo "SSH_HOST set: $([ -n "$SSH_HOST" ] && echo yes || echo NO)"
          echo "SSH_PORT set: $([ -n "$SSH_PORT" ] && echo yes || echo NO)"
          echo "SSH_USERNAME set: $([ -n "$SSH_USERNAME" ] && echo yes || echo NO)"
          echo "DEPLOY_PATH set: $([ -n "$DEPLOY_PATH" ] && echo yes || echo NO)"
          echo "SSH_PRIVATE_KEY set: $([ -n "$SSH_PRIVATE_KEY" ] && echo yes || echo NO)"
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key -p $SSH_PORT -o StrictHostKeyChecking=no" \
            pamangan.com/frontend/build/ \
            "$SSH_USERNAME@$SSH_HOST:$DEPLOY_PATH/"
          rm -f ~/.ssh/deploy_key

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: ls -la ${{ secrets.DEPLOY_PATH }}/static/js/ | tail -5
