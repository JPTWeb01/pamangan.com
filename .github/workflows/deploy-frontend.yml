name: Deploy Frontend to Hostinger

on:
  push:
    branches: [main]
    paths:
      - 'pamangan.com/frontend/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: pamangan.com/frontend/package-lock.json

      - name: Install dependencies
        working-directory: pamangan.com/frontend
        run: npm ci

      - name: Build
        working-directory: pamangan.com/frontend
        env:
          REACT_APP_API_URL: ${{ vars.REACT_APP_API_URL }}
          REACT_APP_SITE_NAME: pamangan.com
        run: npm run build

      - name: Upload build to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: pamangan.com/frontend/build
          target: /tmp/
          strip_components: 2
          overwrite: true

      - name: Move build to public_html
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cp -rf /tmp/build/. ${{ secrets.DEPLOY_PATH }}/
            rm -rf /tmp/build/
            echo "Deploy complete at $(date)"
            ls -la ${{ secrets.DEPLOY_PATH }}
