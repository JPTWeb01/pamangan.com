name: Deploy Frontend to Hostinger

on:
  push:
    branches: [main]
    paths:
      - 'pamangan.com/frontend/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: pamangan.com/frontend/package-lock.json

      - name: Install dependencies
        working-directory: pamangan.com/frontend
        run: npm ci

      - name: Build
        working-directory: pamangan.com/frontend
        env:
          REACT_APP_API_URL: ${{ vars.REACT_APP_API_URL }}
          REACT_APP_SITE_NAME: pamangan.com
        run: npm run build

      - name: Deploy via rsync over SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }}" \
            pamangan.com/frontend/build/ \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/
          rm -f ~/.ssh/deploy_key

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            echo "=== HOME DIR ==="
            echo $HOME
            echo "=== ALL asset-manifest.json locations ==="
            find $HOME -name "asset-manifest.json" 2>/dev/null
            echo "=== DEPLOY_PATH index.html ==="
            cat ${{ secrets.DEPLOY_PATH }}/index.html
