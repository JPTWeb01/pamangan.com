name: Deploy Frontend to Hostinger

on:
  push:
    branches: [main]
    paths:
      - 'pamangan.com/frontend/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pamangan.com/frontend/package-lock.json

      - name: Install dependencies
        working-directory: pamangan.com/frontend
        run: npm ci

      - name: Build
        working-directory: pamangan.com/frontend
        env:
          REACT_APP_API_URL: ${{ vars.REACT_APP_API_URL }}
          REACT_APP_SITE_NAME: pamangan.com
        run: npm run build

      - name: Deploy to Hostinger via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: pamangan.com/frontend/build/
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 3
          overwrite: true

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            echo "Deployed files:"
            ls -la ${{ secrets.DEPLOY_PATH }}
            echo "Deploy complete at $(date)"
